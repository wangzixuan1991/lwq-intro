<head>

<title>李文琦 个人网站内容收集器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#3b5bdb;--accent-light:#e8ecfd;--accent-hover:#2f4ac7;
  --text:#1a1a2e;--text-muted:#6b7280;--border:#e5e7eb;
  --bg:#fafafa;--surface:#fff;--surface2:#f3f4f6;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
/* TOP BAR */
#topbar{
  position:sticky;top:0;z-index:100;background:var(--surface);
  border-bottom:1px solid var(--border);padding:10px 20px;
  display:flex;flex-direction:column;gap:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
#topbar-row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#topbar-title{font-weight:700;font-size:15px;color:var(--text);flex:1;min-width:200px}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;
  font-size:13px;font-family:var(--font);font-weight:500;
  transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--surface2);border-color:#adb5bd}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-danger{color:#dc2626;border-color:#fca5a5}
.btn-danger:hover{background:#fef2f2}
#progress-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
#progress-track{width:120px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
#progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
#topbar-sub{font-size:12px;color:var(--text-muted)}
/* TOAST */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:8px;
  font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;
}
#toast.show{opacity:1}
/* LAYOUT */
#main{max-width:960px;margin:0 auto;padding:24px 20px 80px}
/* SECTION */
.section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:20px;overflow:hidden;
}
.section-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 20px;cursor:pointer;user-select:none;
  border-bottom:1px solid var(--border);
}
.section-header:hover{background:var(--surface2)}
.section-title{font-weight:700;font-size:15px}
.section-count{font-size:12px;color:var(--text-muted);margin-left:auto}
.chevron{transition:transform .2s;color:var(--text-muted);font-style:normal}
.section-body{padding:20px}
.section.collapsed .section-body{display:none}
.section.collapsed .chevron{transform:rotate(-90deg)}
/* GRID ROW */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:600px){.field-row{grid-template-columns:1fr}}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
input[type=text],input[type=number],input[type=email],input[type=tel],textarea,select{
  width:100%;padding:8px 10px;border:1px solid var(--border);
  border-radius:var(--radius);font-size:14px;font-family:var(--font);
  background:var(--surface);color:var(--text);
  transition:border-color .15s,box-shadow .15s;
}
input:focus,textarea:focus,select:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(59,91,219,.12);
}
textarea{resize:vertical;min-height:80px}
textarea.tall{min-height:160px}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
input[type=radio]{accent-color:var(--accent);cursor:pointer}
/* CHECKBOX ROW */
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px}
.radio-group{display:flex;flex-direction:column;gap:8px}
.radio-row{display:flex;align-items:flex-start;gap:8px;font-size:14px}
.radio-row .desc{font-size:12px;color:var(--text-muted);margin-top:2px}
/* REPEATING LIST */
.rep-list{display:flex;flex-direction:column;gap:10px}
.rep-item{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;background:var(--surface2);
  position:relative;
}
.rep-item-header{
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
}
.rep-item-num{
  font-size:11px;font-weight:700;color:var(--text-muted);
  background:#e5e7eb;border-radius:4px;padding:1px 6px;
}
.rep-controls{display:flex;gap:4px;margin-left:auto}
.btn-sm{
  padding:3px 8px;font-size:12px;border-radius:4px;
  border:1px solid var(--border);background:var(--surface);
  cursor:pointer;font-family:var(--font);color:var(--text);
}
.btn-sm:hover{background:var(--surface2)}
.btn-sm.danger{color:#dc2626;border-color:#fca5a5}
.btn-sm.danger:hover{background:#fef2f2}
.add-btn{
  margin-top:10px;padding:7px 16px;
  border:1.5px dashed var(--border);border-radius:var(--radius);
  background:transparent;color:var(--text-muted);
  cursor:pointer;font-size:13px;font-family:var(--font);
  width:100%;transition:all .15s;
}
.add-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
/* IMAGE PREVIEW */
.img-preview{
  max-width:180px;max-height:180px;border-radius:8px;
  border:1px solid var(--border);margin-top:8px;display:none;
}
.img-preview.visible{display:block}
/* SUB-SECTION for publications */
.subsection{margin-bottom:16px}
.subsection-header{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:6px;cursor:pointer;
  background:var(--accent-light);border:1px solid #c5cff5;
  margin-bottom:8px;
}
.subsection-header:hover{background:#dde3fa}
.subsection-title{font-weight:700;font-size:13px;color:var(--accent)}
.subsection-body.collapsed{display:none}
/* SEPARATOR */
hr.light{border:none;border-top:1px solid var(--border);margin:16px 0}
/* PHASE TAG */
.tag{
  display:inline-block;padding:1px 7px;border-radius:20px;
  font-size:11px;font-weight:600;margin-left:6px;
}
.tag-journal{background:#dbeafe;color:#1e40af}
.tag-conference{background:#dcfce7;color:#166534}
.tag-review{background:#fef9c3;color:#854d0e}
.tag-book{background:#fae8ff;color:#6b21a8}
.tag-patent{background:#ffedd5;color:#9a3412}
</style>
</head>

<script>
// ─── SEED DATA ───────────────────────────────────────────────────────────────
const SEED = JSON.parse(document.getElementById('seed-data').textContent);

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {};
let saveTimer = null;

function deepClone(o){return JSON.parse(JSON.stringify(o))}

function initState(){
  state = {
    profile: deepClone(SEED.profile),
    news: deepClone(SEED.news),
    publications: deepClone(SEED.publications),
    projects: deepClone(SEED.projects),
    talks: deepClone(SEED.talks),
    awards: deepClone(SEED.awards),
    teaching: deepClone(SEED.teaching),
    experience: deepClone(SEED.experience),
    education: deepClone(SEED.education),
    preferences: {blog:"maybe",gallery:"maybe",newsPage:"maybe",publicPhone:false,openPositions:"maybe",rss:"maybe"},
    theme: "undecided",
    images: {avatar:"",hero:"",extra:[]},
    cvPdf: "",
    freeform: ""
  };
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────────────
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e}
function inp(type,val,placeholder,extra){
  const i=document.createElement('input');
  i.type=type||'text';i.value=val||'';
  if(placeholder)i.placeholder=placeholder;
  if(extra)Object.assign(i,extra);
  return i;
}
function ta(val,placeholder,cls){
  const t=document.createElement('textarea');
  t.value=val||'';if(placeholder)t.placeholder=placeholder;
  if(cls)t.className=cls;return t;
}
function lbl(text){const l=document.createElement('label');l.textContent=text;return l}

function fieldGroup(labelText,inputEl,full){
  const g=el('div','field-group'+(full?' full':''));
  if(labelText)g.appendChild(lbl(labelText));
  if(inputEl)g.appendChild(inputEl);
  return g;
}
function fieldRow(...groups){const r=el('div','field-row');groups.forEach(g=>r.appendChild(g));return r}

// ─── SECTION BUILDER ─────────────────────────────────────────────────────────
function makeSection(id,title,bodyFn,startOpen=true){
  const sec=el('div','section'+(startOpen?'':' collapsed'));
  sec.id='sec-'+id;
  const hdr=el('div','section-header');
  hdr.innerHTML=`<span class="section-title">${title}</span><em class="chevron">▾</em>`;
  hdr.addEventListener('click',()=>sec.classList.toggle('collapsed'));
  const body=el('div','section-body');
  bodyFn(body);
  sec.appendChild(hdr);sec.appendChild(body);
  return sec;
}

// ─── REPEATING LIST BUILDER ──────────────────────────────────────────────────
function makeRepList(container, items, rowBuilderFn, addLabel){
  const list=el('div','rep-list');
  container.appendChild(list);

  function renderAll(){
    list.innerHTML='';
    items.forEach((_,i)=>list.appendChild(makeRepItem(i)));
    updateProgress();
  }

  function makeRepItem(i){
    const item=el('div','rep-item');
    const hdr=el('div','rep-item-header');
    hdr.appendChild(el('span','rep-item-num',`#${i+1}`));
    const ctrl=el('div','rep-controls');
    const up=el('button','btn-sm','↑');up.title='上移';
    const dn=el('button','btn-sm','↓');dn.title='下移';
    const rm=el('button','btn-sm danger','✕');rm.title='删除';
    up.onclick=()=>{if(i>0){const t=items[i];items[i]=items[i-1];items[i-1]=t;renderAll();}};
    dn.onclick=()=>{if(i<items.length-1){const t=items[i];items[i]=items[i+1];items[i+1]=t;renderAll();}};
    rm.onclick=()=>{if(confirm('确认删除这一条？')){items.splice(i,1);renderAll();}};
    ctrl.appendChild(up);ctrl.appendChild(dn);ctrl.appendChild(rm);
    hdr.appendChild(ctrl);item.appendChild(hdr);
    rowBuilderFn(item,items[i],i);
    return item;
  }

  const addBtn=el('button','add-btn',`+ 添加 ${addLabel}`);
  addBtn.onclick=()=>{items.push(addLabel==='新条目'?{}:buildEmptyRow(addLabel));renderAll();};
  container.appendChild(addBtn);

  renderAll();
  return {refresh:renderAll};
}

function buildEmptyRow(type){
  const bi={zh:'',en:''};
  if(type==='News')return{date:'',text:{zh:'',en:''},link:''};
  if(type==='Publication')return{category:'journal',year:new Date().getFullYear(),authors:'',title:{zh:'',en:''},venue:{zh:'',en:''},note:{zh:'',en:''},link:''};
  if(type==='Project')return{kind:'research',title:{zh:'',en:''},period:'',role:{zh:'',en:''},funder:{zh:'',en:''},note:{zh:'',en:''}};
  if(type==='Talk')return{date:'',kind:'talk',title:{zh:'',en:''},venue:{zh:'',en:''},location:{zh:'',en:''}};
  if(type==='Award')return{year:'',title:{zh:'',en:''}};
  if(type==='Teaching')return{role:{zh:'',en:''},course:{zh:'',en:''},period:''};
  if(type==='Experience')return{org:{zh:'',en:''},title:{zh:'',en:''},period:''};
  if(type==='Education')return{school:{zh:'',en:''},degree:{zh:'',en:''},period:''};
  if(type==='Research Area')return{zh:'',en:''};
  return{};
}

// ─── BIND HELPERS ────────────────────────────────────────────────────────────
function bindText(inputEl, obj, key, schedSave){
  inputEl.value=obj[key]||'';
  inputEl.addEventListener('input',()=>{obj[key]=inputEl.value;schedSave();});
}
function bindCheck(inputEl, obj, key, schedSave){
  inputEl.checked=!!obj[key];
  inputEl.addEventListener('change',()=>{obj[key]=inputEl.checked;schedSave();});
}

// ─── SCHEDULE SAVE ───────────────────────────────────────────────────────────
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{localStorage.setItem('lwq-content-draft',JSON.stringify(state));},400);
}

// ─── SECTION: BASIC INFO ─────────────────────────────────────────────────────
function buildBasicInfo(body){
  const p=state.profile;
  // Name
  const nameZh=inp('text',p.name.zh,'李文琦');
  const nameEn=inp('text',p.name.en,'Wenqi Li');
  bindText(nameZh,p.name,'zh',scheduleSave);bindText(nameEn,p.name,'en',scheduleSave);
  body.appendChild(fieldRow(fieldGroup('中文名 Name (ZH)',nameZh),fieldGroup('英文名 Name (EN)',nameEn)));
  // Title
  const titleZh=inp('text',p.title.zh);const titleEn=inp('text',p.title.en);
  bindText(titleZh,p.title,'zh',scheduleSave);bindText(titleEn,p.title,'en',scheduleSave);
  body.appendChild(fieldRow(fieldGroup('中文职称 Title (ZH)',titleZh),fieldGroup('英文职称 Title (EN)',titleEn)));
  // Affiliation
  const affZh=inp('text',p.affiliation.zh);const affEn=inp('text',p.affiliation.en);
  bindText(affZh,p.affiliation,'zh',scheduleSave);bindText(affEn,p.affiliation,'en',scheduleSave);
  body.appendChild(fieldRow(fieldGroup('中文单位 Affiliation (ZH)',affZh),fieldGroup('英文单位 Affiliation (EN)',affEn)));
  // Email
  const emailEl=inp('email',p.email,'wenqili@pku.edu.cn');
  bindText(emailEl,p,'email',scheduleSave);
  // Phone + public
  const phoneEl=inp('tel',p.phone,'+86...');
  bindText(phoneEl,p,'phone',scheduleSave);
  const phoneChk=inp('checkbox');
  bindCheck(phoneChk,p,'phonePublic',scheduleSave);
  const phoneGroup=el('div','field-group');
  phoneGroup.appendChild(lbl('电话 Phone'));phoneGroup.appendChild(phoneEl);
  const chkRow=el('div','check-row');chkRow.style.marginTop='6px';
  chkRow.appendChild(phoneChk);chkRow.appendChild(document.createTextNode('是否公开手机号 Public phone'));
  phoneGroup.appendChild(chkRow);
  body.appendChild(fieldRow(fieldGroup('邮箱 Email',emailEl),phoneGroup));
  // Office
  const officeEl=inp('text',p.office||'','办公室地址');
  bindText(officeEl,p,'office',scheduleSave);
  body.appendChild(fieldRow(fieldGroup('办公地址 Office Address',officeEl,true)));
}

// ─── SECTION: PHOTOS ─────────────────────────────────────────────────────────
function buildPhotos(body){
  function fileSection(label,key,multi){
    const g=el('div','field-group full');g.style.marginBottom='16px';
    g.appendChild(lbl(label));
    const inp2=document.createElement('input');inp2.type='file';inp2.accept='image/*';
    if(multi)inp2.multiple=true;
    g.appendChild(inp2);
    if(!multi){
      const prev=el('img','img-preview');prev.alt='preview';
      if(state.images[key]){{prev.src=state.images[key];prev.classList.add('visible');}}
      g.appendChild(prev);
      inp2.addEventListener('change',()=>{
        const file=inp2.files[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=e=>{state.images[key]=e.target.result;prev.src=e.target.result;prev.classList.add('visible');scheduleSave();};
        reader.readAsDataURL(file);
      });
    } else {
      inp2.addEventListener('change',()=>{
        state.images.extra=[];
        Array.from(inp2.files).forEach(file=>{
          const r=new FileReader();r.onload=e=>{state.images.extra.push(e.target.result);scheduleSave();};r.readAsDataURL(file);
        });
      });
    }
    body.appendChild(g);
  }
  fileSection('头像 Avatar (preview after upload)','avatar',false);
  fileSection('Hero 横幅 Hero Banner','hero',false);
  fileSection('备用照片 Extra Photos (multi)','extra',true);
}

// ─── SECTION: SOCIAL IDs ─────────────────────────────────────────────────────
function buildSocial(body){
  const s=state.profile.social;
  const fields=[
    ['Google Scholar URL','googleScholar'],
    ['ORCID URL','orcid'],
    ['GitHub URL','github'],
    ['LinkedIn URL','linkedin'],
    ['X/Twitter URL','twitter'],
    ['ResearchGate URL','researchGate'],
    ['个人主页 Personal Homepage','homepage']
  ];
  for(let i=0;i<fields.length;i+=2){
    const pair=fields.slice(i,i+2);
    const groups=pair.map(([label,key])=>{
      const el2=inp('text',s[key]||'','https://...');
      bindText(el2,s,key,scheduleSave);
      return fieldGroup(label,el2);
    });
    if(groups.length===1)groups[0].classList.add('full');
    body.appendChild(fieldRow(...groups));
  }
}

// ─── SECTION: BIO ────────────────────────────────────────────────────────────
function buildBio(body){
  const b=state.profile.bio;
  const zhTa=ta(b.zh,'中文简介...','tall');
  const enTa=ta(b.en,'English bio...','tall');
  bindText(zhTa,b,'zh',scheduleSave);bindText(enTa,b,'en',scheduleSave);
  body.appendChild(fieldRow(fieldGroup('中文简介 Bio (ZH)',zhTa),fieldGroup('英文简介 Bio (EN)',enTa)));
}

// ─── SECTION: RESEARCH AREAS ─────────────────────────────────────────────────
function buildResearchAreas(body){
  const areas=state.profile.researchAreas;
  // Convert to array of pairs
  let pairs=areas.zh.map((zh,i)=>({zh,en:areas.en[i]||''}));

  const list=el('div','rep-list');body.appendChild(list);

  function render(){
    list.innerHTML='';
    pairs.forEach((pair,i)=>{
      const item=el('div','rep-item');
      const hdr=el('div','rep-item-header');
      hdr.appendChild(el('span','rep-item-num',`#${i+1}`));
      const ctrl=el('div','rep-controls');
      const up=el('button','btn-sm','↑');const dn=el('button','btn-sm','↓');const rm=el('button','btn-sm danger','✕');
      up.onclick=()=>{if(i>0){const t=pairs[i];pairs[i]=pairs[i-1];pairs[i-1]=t;sync();render();}};
      dn.onclick=()=>{if(i<pairs.length-1){const t=pairs[i];pairs[i]=pairs[i+1];pairs[i+1]=t;sync();render();}};
      rm.onclick=()=>{if(confirm('删除？')){pairs.splice(i,1);sync();render();}};
      ctrl.appendChild(up);ctrl.appendChild(dn);ctrl.appendChild(rm);
      hdr.appendChild(ctrl);item.appendChild(hdr);
      const zhI=inp('text',pair.zh,'中文方向');
      const enI=inp('text',pair.en,'English area');
      zhI.addEventListener('input',()=>{pair.zh=zhI.value;sync();scheduleSave();});
      enI.addEventListener('input',()=>{pair.en=enI.value;sync();scheduleSave();});
      item.appendChild(fieldRow(fieldGroup('ZH',zhI),fieldGroup('EN',enI)));
      list.appendChild(item);
    });
  }

  function sync(){
    areas.zh=pairs.map(p=>p.zh);
    areas.en=pairs.map(p=>p.en);
    updateProgress();
  }

  const addBtn=el('button','add-btn','+ 添加研究方向');
  addBtn.onclick=()=>{pairs.push({zh:'',en:''});sync();render();};
  body.appendChild(addBtn);
  render();
}

// ─── NEWS ROW BUILDER ────────────────────────────────────────────────────────
function buildNewsRow(item,n){
  const dateEl=inp('text',n.date,'YYYY-MM');
  bindText(dateEl,n,'date',scheduleSave);
  const linkEl=inp('text',n.link||'','https://... (可选 optional)');
  bindText(linkEl,n,'link',scheduleSave);
  item.appendChild(fieldRow(fieldGroup('日期 Date (YYYY-MM)',dateEl),fieldGroup('链接 Link (optional)',linkEl)));
  const zhTa2=ta(n.text.zh,'中文动态...');
  const enTa2=ta(n.text.en,'English news...');
  bindText(zhTa2,n.text,'zh',scheduleSave);bindText(enTa2,n.text,'en',scheduleSave);
  item.appendChild(fieldRow(fieldGroup('中文 ZH',zhTa2),fieldGroup('英文 EN',enTa2)));
}

// ─── PUBLICATION ROW BUILDER ─────────────────────────────────────────────────
function buildPubRow(item,p){
  const catEl=document.createElement('select');
  ['journal','conference','under_review','book','patent'].forEach(v=>{
    const o=document.createElement('option');o.value=v;o.textContent=v;catEl.appendChild(o);
  });
  catEl.value=p.category||'journal';
  catEl.addEventListener('change',()=>{p.category=catEl.value;scheduleSave();});

function buildPublications(body){
  const cats=[
    {id:'journal',label:'期刊论文 Journal Articles',cls:'tag-journal'},

    {id:'under_review',label:'在审论文 Under Review',cls:'tag-review'},
    {id:'book',label:'专著/章节 Books & Chapters',cls:'tag-book'},
    {id:'patent',label:'专利 Patents',cls:'tag-patent'}
  ];
  cats.forEach(({id,label,cls})=>{
    const sub=el('div','subsection');
    const subHdr=el('div','subsection-header');
    subHdr.innerHTML=`<span class="subsection-title">${label}</span><span class="tag ${cls}">${state.publications.filter(p=>p.category===id).length}</span><em class="chevron" style="margin-left:auto;font-style:normal;font-size:12px">▾</em>`;
    const subBody=el('div','subsection-body');
    subHdr.addEventListener('click',()=>subBody.classList.toggle('collapsed'));

    const items=state.publications.filter(p=>p.category===id);
    // Since publications is a flat array filtered by category, we manage a per-category view
    // but edits directly mutate the shared state.publications entries
    const list=el('div','rep-list');subBody.appendChild(list);

    function renderCat(){
      list.innerHTML='';
      const catItems=state.publications.filter(p=>p.category===id);
      catItems.forEach((pub,ci)=>{
        const globalIdx=state.publications.indexOf(pub);
        const item2=el('div','rep-item');
        const hdr2=el('div','rep-item-header');
        hdr2.appendChild(el('span','rep-item-num',`#${ci+1}`));
        const ctrl2=el('div','rep-controls');
        const rm2=el('button','btn-sm danger','✕');rm2.title='删除';
        rm2.onclick=()=>{if(confirm('删除此条？')){state.publications.splice(globalIdx,1);renderCat();}};
        // up/down within category
        const up2=el('button','btn-sm','↑');
        up2.onclick=()=>{
          const ci2=state.publications.indexOf(pub);
          // find prev same-category
          let prev=-1;
          for(let k=ci2-1;k>=0;k--){if(state.publications[k].category===id){prev=k;break;}}
          if(prev>=0){const t=state.publications[ci2];state.publications[ci2]=state.publications[prev];state.publications[prev]=t;renderCat();}
        };
        const dn2=el('button','btn-sm','↓');
        dn2.onclick=()=>{
          const ci2=state.publications.indexOf(pub);
          let nxt=-1;
          for(let k=ci2+1;k<state.publications.length;k++){if(state.publications[k].category===id){nxt=k;break;}}
          if(nxt>=0){const t=state.publications[ci2];state.publications[ci2]=state.publications[nxt];state.publications[nxt]=t;renderCat();}
        };
        ctrl2.appendChild(up2);ctrl2.appendChild(dn2);ctrl2.appendChild(rm2);
        hdr2.appendChild(ctrl2);item2.appendChild(hdr2);
        buildPubRow(item2,pub);
        list.appendChild(item2);
      });
      // Update count badge
      const badge=subHdr.querySelector('.tag');
      if(badge)badge.textContent=state.publications.filter(p=>p.category===id).length;
      updateProgress();
    }

    const addBtn2=el('button','add-btn',`+ 添加${label}`);
    addBtn2.onclick=()=>{
      const newPub={category:id,year:new Date().getFullYear(),authors:'',title:{zh:'',en:''},venue:{zh:'',en:''},note:{zh:'',en:''},link:''};
      state.publications.push(newPub);renderCat();
    };
    subBody.appendChild(addBtn2);
    sub.appendChild(subHdr);sub.appendChild(subBody);
    body.appendChild(sub);
    renderCat();
  });
}

function buildPreferences(body){
  const pref=state.preferences;

  function radioGroup(labelText, key, opts){
    const wrapper=el('div');wrapper.style.marginBottom='16px';
    wrapper.appendChild(el('div','',`<strong style="font-size:13px">${labelText}</strong>`));
    const rg=el('div','radio-group');rg.style.marginTop='6px';
    opts.forEach(([val,label])=>{
      const row=el('div','radio-row');
      const r=inp('radio');r.name=`pref-${key}`;r.value=val;r.checked=(pref[key]===val);
      r.addEventListener('change',()=>{if(r.checked){pref[key]=val;scheduleSave();}});
      row.appendChild(r);row.appendChild(document.createTextNode(' '+label));
      rg.appendChild(row);
    });
    wrapper.appendChild(rg);body.appendChild(wrapper);
  }

  function checkRow2(labelText, key){
    const row=el('div','check-row');row.style.marginBottom='12px';
    const chk=inp('checkbox');chk.checked=!!pref[key];
    chk.addEventListener('change',()=>{pref[key]=chk.checked;scheduleSave();});
    row.appendChild(chk);row.appendChild(el('span','',` <strong>${labelText}</strong>`));
    body.appendChild(row);
  }

  radioGroup('是否需要 Blog 板块?','blog',[['yes','是 Yes'],['no','否 No'],['maybe','不确定 Maybe']]);
  radioGroup('是否需要 Photo Gallery 相册?','gallery',[['yes','是 Yes'],['no','否 No'],['maybe','不确定 Maybe']]);
  radioGroup('是否需要单独 News 页? (动态条数较多时)','newsPage',[['yes','是 Yes'],['no','否 No'],['maybe','不确定 Maybe']]);
  radioGroup('给学生招收类信息预留版块? (Open positions)','openPositions',[['yes','是 Yes'],['no','否 No'],['maybe','不确定 Maybe']]);
  radioGroup('是否要 RSS feed?','rss',[['yes','是 Yes'],['no','否 No'],['maybe','不确定 Maybe']]);
  checkRow2('是否公开手机号? Public Phone',  'publicPhone');
}

// ─── SECTION: THEME ──────────────────────────────────────────────────────────
function buildTheme(body){
  const themes=[
    ['editorial','A · Editorial — 期刊风，左侧栏，serif 字体，学术感强'],
    ['modern','B · Modern Minimal — 极简，大留白，sans-serif，清爽'],
    ['classical','C · Classical Premium — 古典高级感，奶白底，暖色调'],
    ['undecided','都看一下再决定 — Undecided, show me options']
  ];
  const rg=el('div','radio-group');
  themes.forEach(([val,label])=>{
    const row=el('div','radio-row');
    const r=inp('radio');r.name='theme';r.value=val;r.checked=(state.theme===val);
    r.addEventListener('change',()=>{if(r.checked){state.theme=val;scheduleSave();}});
    row.appendChild(r);row.appendChild(document.createTextNode(' '+label));
    rg.appendChild(row);
  });
  body.appendChild(rg);
}

// ─── SECTION: CV PDF ─────────────────────────────────────────────────────────
function buildCV(body){
  const g=el('div','field-group full');
  g.appendChild(lbl('CV PDF 文件 (将转为 base64 内嵌)'));
  const fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='.pdf';
  const status=el('div');status.style.cssText='font-size:12px;color:var(--text-muted);margin-top:4px';
  if(state.cvPdf)status.textContent='已上传 CV PDF (已存储)';
  fileInput.addEventListener('change',()=>{
    const file=fileInput.files[0];if(!file)return;
    status.textContent='读取中...';
    const r=new FileReader();
    r.onload=e=>{state.cvPdf=e.target.result;status.textContent='已上传: '+file.name+' ('+Math.round(file.size/1024)+'KB)';scheduleSave();};
    r.readAsDataURL(file);
  });
  g.appendChild(fileInput);g.appendChild(status);body.appendChild(g);
}

// ─── SECTION: FREEFORM ───────────────────────────────────────────────────────
function buildFreeform(body){
  const t=ta(state.freeform||'','随便写，想对 Zixuan 说的话、网站需求、补充说明等... Anything you want to tell Zixuan about the site.','tall');
  t.style.minHeight='200px';
  bindText(t,state,'freeform',scheduleSave);
  body.appendChild(t);
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function updateProgress(){
  const inputs=document.querySelectorAll('#main input[type=text],#main input[type=email],#main input[type=tel],#main input[type=number],#main textarea');
  let total=0,filled=0;
  inputs.forEach(i=>{total++;if(i.value.trim())filled++;});
  const pct=total?Math.round(filled/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=pct+'%';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg,duration=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}

// ─── DRAFT ───────────────────────────────────────────────────────────────────
function saveDraft(){
  localStorage.setItem('lwq-content-draft',JSON.stringify(state));
  toast('草稿已保存 Draft saved ✓');
}

function restoreDraft(){
  const raw=localStorage.getItem('lwq-content-draft');
  if(!raw){toast('没有找到草稿 No draft found');return;}
  if(!confirm('恢复草稿会覆盖当前编辑内容，确认吗？\nRestore draft? This will overwrite current form.'))return;
  try{
    const saved=JSON.parse(raw);
    Object.assign(state,saved);
    buildUI();
    toast('草稿已恢复 Draft restored ✓');
  }catch(e){toast('恢复失败 Restore failed: '+e.message);}
}

function resetAll(){
  if(!confirm('重置会清除所有内容和草稿，确认吗？\nReset? This clears all data and draft.'))return;
  localStorage.removeItem('lwq-content-draft');
  location.reload();
}

// ─── EXPORT JSON ─────────────────────────────────────────────────────────────
function exportJSON(){
  const p=state.profile;
  const out={
    profile:{
      name:p.name,
      title:p.title,
      affiliation:p.affiliation,
      email:p.email,
      phone:p.phone,
      phonePublic:!!p.phonePublic,
      office:p.office||'',
      social:p.social,
      researchAreas:p.researchAreas,
      bio:p.bio
    },
    publications:state.publications.map(pub=>({
      category:pub.category,
      year:Number(pub.year)||new Date().getFullYear(),
      authors:pub.authors||'',
      title:pub.title||{zh:'',en:''},
      venue:pub.venue||{zh:'',en:''},
      note:pub.note||{zh:'',en:''},
      link:pub.link||''
    })),
    news:state.news.map(n=>({
      date:n.date||'',
      text:n.text||{zh:'',en:''},
      link:n.link||''
    })),
    projects:state.projects.map(pr=>({
      kind:pr.kind,
      title:pr.title||{zh:'',en:''},
      period:pr.period||'',
      role:pr.role||{zh:'',en:''},
      funder:pr.funder||{zh:'',en:''},
      note:pr.note||{zh:'',en:''}
    })),
    talks:state.talks.map(t=>({
      date:t.date||'',
      kind:t.kind,
      title:t.title||{zh:'',en:''},
      venue:t.venue||{zh:'',en:''},
      location:t.location||{zh:'',en:''}
    })),
    awards:state.awards.map(a=>({
      year:a.year||'',
      title:a.title||{zh:'',en:''}
    })),
    teaching:state.teaching.map(t=>({
      role:t.role||{zh:'',en:''},
      course:t.course||{zh:'',en:''},
      period:t.period||''
    })),
    experience:state.experience.map(e=>({
      org:e.org||{zh:'',en:''},
      title:e.title||{zh:'',en:''},
      period:e.period||''
    })),
    education:state.education.map(e=>({
      school:e.school||{zh:'',en:''},
      degree:e.degree||{zh:'',en:''},
      period:e.period||''
    })),
    preferences:state.preferences,
    theme:state.theme||'undecided',
    images:state.images||{avatar:'',hero:'',extra:[]},
    cvPdf:state.cvPdf||'',
    freeform:state.freeform||''
  };

  const now=new Date();
  const ts=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`lwq-content-${ts}.json`;a.click();
  URL.revokeObjectURL(url);
  toast('JSON 已导出 Exported ✓');
}

// ─── BUILD UI ────────────────────────────────────────────────────────────────
function buildUI(){
  const main=document.getElementById('main');
  main.innerHTML='';

  const sections=[
    ['basic','基本信息 / Basic Info',buildBasicInfo,true],
    ['photos','照片与图片 / Photos',buildPhotos,true],
    ['social','社交 / 学术 ID / Social IDs',buildSocial,true],
    ['bio','简介 / Bio',buildBio,true],
    ['areas','研究方向 / Research Areas',buildResearchAreas,true],
    ['news','News 动态 / News',body=>{makeRepList(body,state.news,buildNewsRow,'News');},true],
    ['pubs','Publications / 学术成果',buildPublications,true],
    ['projects','Projects / 项目',buildProjects,true],
    ['talks','Talks / 学术报告与活动',buildTalks,true],
    ['awards','Awards / 荣誉奖励',buildAwards,true],
    ['teaching','Teaching / 教学经历',buildTeaching,true],
    ['experience','Experience / 工作经历',buildExperience,true],
    ['education','Education / 教育背景',buildEducation,true],
    ['prefs','Section preferences / 站点结构问答',buildPreferences,true],
    ['theme','Theme / 风格偏好',buildTheme,true],
    ['cv','CV PDF',buildCV,true],
    ['freeform','额外想说的 / Anything else',buildFreeform,true]
  ];

  sections.forEach(([id,title,fn,open])=>{
    main.appendChild(makeSection(id,title,fn,open));
  });

  updateProgress();
  // Attach global input listener for auto-save
  main.addEventListener('input',()=>scheduleSave());
  main.addEventListener('change',()=>scheduleSave());
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(function(){
  initState();
  // Try to load draft silently on startup
  const raw=localStorage.getItem('lwq-content-draft');
  if(raw){
    try{
      const saved=JSON.parse(raw);
      Object.assign(state,saved);
    }catch(e){}
  }
  buildUI();
})();
</script>
